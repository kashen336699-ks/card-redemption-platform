<!doctype html>
<!-- 页面：兑换失败 | UX-001/002/003 | FR-008/009
     与成功页共用卡片骨架，替换图标/标题/说明/主操作（PRD 开发提示）
     状态：?code=INVALID_CODE|ALREADY_REDEEMED|EXPIRED_CODE|DISABLED_CODE|NO_STOCK|TOO_MANY_ATTEMPTS|SYSTEM_ERROR -->
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>卡密兑换 · 失败</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
</head>
<body>
<main class="page">
  <header class="brand">
    <div class="brand__logo"></div>
    <div class="brand__name">兑换中心</div>
    <div class="brand__tag">安全 · 即时 · 免注册</div>
  </header>

  <section class="card" aria-label="兑换失败">
    <div class="status-icon status-icon--err" aria-hidden="true">!</div>
    <h1 class="title center" id="err-title">兑换未成功</h1>
    <p class="muted center" id="err-msg" role="alert" style="margin:0 0 18px;">未找到该卡密，请检查后重新输入。</p>

    <div class="link-row">
      <a class="btn-ghost" href="redeem-home.html" id="primary-action">重新输入</a>
      <a class="btn-ghost" href="#" id="support">联系售后</a>
    </div>

    <div class="sechint" style="margin-top:18px;">
      <span class="dot">●</span>
      <span id="extra">如非本人操作或有疑问，请通过售后入口联系商家处理。</span>
    </div>
  </section>

  <footer>售后请提供卡密末四位、闲鱼订单号或兑换编号，便于快速定位。</footer>
</main>

<script>
  // FR-008：7 类稳定错误码 → 文案 + 主操作（与 PRD §6.3 一致）
  var MAP = {
    INVALID_CODE:     {t:'未找到该卡密', m:'未找到该卡密，请检查后重新输入。', a:'重新输入', href:'redeem-home.html'},
    ALREADY_REDEEMED: {t:'该卡密已兑换', m:'该卡密已兑换，如非本人操作请联系售后。', a:'联系售后', href:'#'},
    EXPIRED_CODE:     {t:'卡密已过期', m:'该卡密已过期，请联系商家处理。', a:'联系售后', href:'#'},
    DISABLED_CODE:    {t:'卡密不可用', m:'该卡密当前不可用，请联系商家处理。', a:'联系售后', href:'#'},
    NO_STOCK:         {t:'暂时无法交付', m:'商品正在补充中，请稍后重试。', a:'稍后重试', href:'redeem-home.html'},
    TOO_MANY_ATTEMPTS:{t:'尝试次数过多', m:'尝试次数过多，请稍后再试。', a:'我知道了', href:'redeem-home.html'},
    SYSTEM_ERROR:     {t:'系统开小差了', m:'系统开小差了，本次未消耗卡密，请重新提交。', a:'重新提交', href:'redeem-home.html'}
  };
  var code = new URLSearchParams(location.search).get('code') || 'INVALID_CODE';
  var c = MAP[code] || MAP.INVALID_CODE;
  document.getElementById('err-title').textContent = c.t;
  document.getElementById('err-msg').textContent = c.m;
  var pa = document.getElementById('primary-action');
  pa.textContent = c.a; pa.href = c.href;
</script>
</body>
</html>
